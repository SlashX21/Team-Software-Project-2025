name: Backend CI

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'Backend/**'
      - '.env.example'
      - 'pom.xml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Backend/**'
      - '.env.example'
      - 'pom.xml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: springboot_demo_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Create test environment file
      run: |
        cp .env.example .env
        sed -i 's/your_database_password_here/testpassword/g' .env
        sed -i 's/springboot_demo/springboot_demo_test/g' .env
        sed -i 's/your_openai_api_key_here/test_key/g' .env
        sed -i 's/your_azure_endpoint_here/test_endpoint/g' .env
        sed -i 's/your_azure_key_here/test_key/g' .env

    - name: Wait for MySQL
      run: |
        timeout 30 bash -c 'until printf "" 2>>/dev/null >>/dev/tcp/$0/$1; do sleep 1; done' localhost 3306

    - name: Run tests
      run: |
        cd Backend/Team-Software-Project-2025-YanHaoSun
        mvn -B clean test --file pom.xml
      env:
        SPRING_PROFILES_ACTIVE: test

    - name: Build application
      run: |
        cd Backend/Team-Software-Project-2025-YanHaoSun
        mvn -B clean install --file pom.xml -DskipTests
      env:
        SPRING_PROFILES_ACTIVE: test

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: '**/target/surefire-reports/*.xml'
        reporter: java-junit

    - name: Upload coverage reports
      if: success()
      uses: codecov/codecov-action@v4
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false