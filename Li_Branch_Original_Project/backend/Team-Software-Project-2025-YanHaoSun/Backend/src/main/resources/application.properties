# Grocery Guardian Backend Application
spring.application.name=grocery-guardian-backend

# 激活默认的开发环境配置
spring.profiles.active=dev

# 通用配置
server.servlet.context-path=/
management.endpoints.web.exposure.include=health,info,env

# JPA通用配置
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Liquibase配置
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/changelog_index.xml

# OpenAPI/Swagger配置
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# 跨域配置
management.cors.allowed-origins=*
management.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
management.cors.allowed-headers=*

